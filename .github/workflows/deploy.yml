name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USER }}/segundo-cerebro
  IMAGE_NAME_WEB: ${{ secrets.DOCKER_USER }}/segundo-cerebro-web

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'deploy/docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
            web:
              - 'web/**'
              - 'deploy/docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'

  test-backend:
    name: Test & Lint (backend)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm test
      - run: pnpm lint

  test-web:
    name: Lint & Build (web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  build-and-push-backend:
    name: Build & Push Backend
    needs: [changes, test-backend]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: env.mtu=1400
      - name: Generate image tag
        id: tag
        run: echo "tag=$(date +%Y%m%d-%H%M%S)-${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-web:
    name: Build & Push Web
    needs: [changes, test-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: env.mtu=1400
      - name: Generate image tag
        id: tag
        run: echo "tag=$(date +%Y%m%d-%H%M%S)-${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME_WEB }}:latest
            ${{ env.IMAGE_NAME_WEB }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sync-deploy-files:
    name: Sync deploy files
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "deploy/*"
          target: "/home/ubuntu/segundo-cerebro"
          strip_components: 1

  deploy-backend:
    name: Deploy Backend to OCI
    needs: [changes, build-and-push-backend, sync-deploy-files]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-backend-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/segundo-cerebro

            if [ ! -f .env ]; then
              cat > .env << 'EOF'
            AUTH_TOKEN=${{ secrets.AUTH_TOKEN }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            LOG_LEVEL=${{ secrets.LOG_LEVEL }}
            TIMEZONE=${{ secrets.TIMEZONE }}
            DOCKER_USER=${{ secrets.DOCKER_USER }}
            IMAGE_TAG=latest
            EOF
            fi

            echo '${{ secrets.FCM_SERVICE_ACCOUNT }}' > fcm-service-account.json

            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="postgresql://segundo_cerebro:${{ secrets.DB_PASSWORD }}@postgres:5432/segundo_cerebro?schema=public" \
              backend npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d --remove-orphans backend
            docker image prune -af

  deploy-web:
    name: Deploy Web to OCI
    needs: [changes, build-and-push-web, sync-deploy-files]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/segundo-cerebro

            if [ ! -f .env ]; then
              cat > .env << 'EOF'
            AUTH_TOKEN=${{ secrets.AUTH_TOKEN }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            LOG_LEVEL=${{ secrets.LOG_LEVEL }}
            TIMEZONE=${{ secrets.TIMEZONE }}
            DOCKER_USER=${{ secrets.DOCKER_USER }}
            IMAGE_TAG=latest
            EOF
            fi

            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d --remove-orphans web
            docker image prune -af
