services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: segundo-cerebro-db
    environment:
      POSTGRES_USER: segundo_cerebro
      POSTGRES_PASSWORD: password
      POSTGRES_DB: segundo_cerebro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U segundo_cerebro"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
